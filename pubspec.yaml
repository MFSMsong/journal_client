name: journal
description: "A new Flutter project."
publish_to: "none"
version: 2.0.6+7
fluwx:
  app_id: "wx30e85737940da4af"
  debug_logging: true 
  ios:
    universal_link: https://journal.uuorb.com/app/
    no_pay: true
  android:
    universal_link: https://journal.uuorb.com/app/
environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.3.1
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.6
  flutter_chat_ui: ^1.6.15
  get: ^4.6.6
  get_storage: ^2.1.1
  dio: ^4.0.6
  shared_preferences: ^2.3.2
  # 日志
  logger: 2.1.0
  # 线程锁  
  synchronized: ^3.0.0+3
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  built_collection: ^5.1.1
  flutter_screenutil: ^5.9.3
  get_time_ago: ^2.0.0
  contained_tab_bar_view: ^0.8.0
  fluwx: ^5.7.5
  # - bruno所需的 - #
  bindings_compatible: ^1.0.1
  path_drawing: ^1.0.1
  xml: ^6.5.0
  flutter_chat_types: ^3.6.2
  uuid: ^4.5.1
  intl: ^0.20.2
  tdesign_flutter: ^0.2.7
  easy_refresh: ^3.4.0
  lottie: ^3.1.2
  permission_handler: ^11.3.1
  json_annotation: ^4.8.1
  bubble: ^1.2.1
  speech_to_text: ^7.3.0
  photo_view: ^0.15.0
  image_picker: ^1.1.2
  tencentcloud_cos_sdk_plugin: ^1.2.6
  slider_captcha: ^1.0.0
  webview_flutter: ^4.8.0
  just_audio: ^0.10.5
  sign_in_with_apple: ^6.1.3
  auth_buttons: ^3.0.3
  video_player: ^2.9.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  home_widget: ^0.9.0
  cached_network_image: ^3.3.1
  shelf: ^1.4.2
  shelf_static: ^1.1.3
  path_provider: ^2.0.0
  archive: ^3.3.0       
  fl_heatmap: ^0.4.6
  flame: ^1.35.0
  flame_forge2d: ^0.19.2 # 专门处理物理碰撞
  sensors_plus: ^7.0.0
  in_app_review: ^2.0.0
  rive: ^0.13.2
  showcaseview: ^5.0.1
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/flame/
    - assets/images/
    - assets/images/playstore-icon.png
    - assets/fonts/
    - assets/json/
    - assets/icons/
    - assets/icons/radio/
    - assets/icons/bill_column/
    - assets/chat_bg/
    - assets/tdtheme.json
    - assets/web.zip
    - assets/rive/

  fonts:
    - family: SmileySans
      fonts:
        - asset: assets/fonts/SmileySans-Oblique.ttf
    - family: ZCOOLKuaiLle
      fonts:
        - asset: assets/fonts/ZCOOLKuaiLe-Regular.ttf
    - family: SourceCodePro
      fonts:
        - asset: assets/fonts/SourceCodePro-Light.ttf
          weight: 300
        - asset: assets/fonts/SourceCodePro-Regular.ttf
          weight: 400
        - asset: assets/fonts/SourceCodePro-Medium.ttf
          weight: 500
        - asset: assets/fonts/SourceCodePro-Bold.ttf
          weight: 700
        - asset: assets/fonts/SourceCodePro-Black.ttf
          weight: 900
